<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sphere X Platform</title>

<style>
:root{
    --primary:#0a2e5c;
    --accent:#1dbf73;
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f1f5f9;
}

body{
    margin:0;
    font-family:Inter, sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* GLASS UI */
.glass{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:25px;
}

/* LOGIN */
#login{
    display:flex;
    height:100vh;
    justify-content:center;
    align-items:center;
}

input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}

button{
    padding:15px;
    width:100%;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* DASHBOARDS */
#userApp, #adminApp{
    display:none;
}

nav{
    padding:20px;
    background:black;
    display:flex;
    justify-content:space-between;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:var(--card);
    padding:20px;
    border-radius:20px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

td,th{
    padding:10px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

/* ANIMATION */
.fade{
    animation:fade 0.6s ease;
}
@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div class="glass">
        <h2>Sphere X Access</h2>
        <input id="phone" placeholder="Phone">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="adminLogin()" style="margin-top:10px;background:#0a2e5c;">Admin</button>
    </div>
</div>

<!-- USER DASHBOARD -->
<div id="userApp">
    <nav>
        <h3>User Portal</h3>
        <button onclick="logout()">Logout</button>
    </nav>

    <div class="grid fade">
        <div class="card">
            <h3>Balance</h3>
            <h1 id="balance">KES 0</h1>
        </div>

        <div class="card">
            <h3>Tasks</h3>
            <button onclick="earn()">Complete Task (+100)</button>
        </div>

        <div class="card">
            <h3>Upgrade</h3>
            <button onclick="pay(500)">Pay 500</button>
            <button onclick="pay(1500)">Pay 1500</button>
        </div>
    </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminApp">
    <nav>
        <h3>Admin Dashboard</h3>
        <button onclick="logout()">Logout</button>
    </nav>

    <div class="grid fade">
        <div class="card">
            <h3>Total Users</h3>
            <h1 id="totalUsers">0</h1>
        </div>

        <div class="card">
            <h3>Total Payments</h3>
            <h1 id="totalPayments">0</h1>
        </div>
    </div>

    <div class="card" style="margin:20px;">
        <h3>Users</h3>
        <table id="userTable">
            <tr><th>Phone</th><th>Balance</th></tr>
        </table>
    </div>
</div>

<script>
let users = [];

function login(){
    let phone=document.getElementById("phone").value;

    if(phone.length<5){ alert("Enter valid"); return;}

    let user={phone:phone,balance:0};
    users.push(user);

    localStorage.setItem("currentUser",JSON.stringify(user));

    showUser();
}

function adminLogin(){
    let pass=document.getElementById("pass").value;

    if(pass==="admin123"){
        showAdmin();
    }else{
        alert("Wrong admin password");
    }
}

function showUser(){
    document.getElementById("login").style.display="none";
    document.getElementById("userApp").style.display="block";
}

function showAdmin(){
    document.getElementById("login").style.display="none";
    document.getElementById("adminApp").style.display="block";

    updateAdmin();
}

function logout(){
    location.reload();
}

function earn(){
    let user=JSON.parse(localStorage.getItem("currentUser"));
    user.balance+=100;
    localStorage.setItem("currentUser",JSON.stringify(user));
    document.getElementById("balance").innerText="KES "+user.balance;
}

function pay(amount){
    alert("Simulated payment of "+amount);
    let total=document.getElementById("totalPayments");
    if(total) total.innerText=parseInt(total.innerText)+amount;
}

function updateAdmin(){
    document.getElementById("totalUsers").innerText=users.length;

    let table=document.getElementById("userTable");
    users.forEach(u=>{
        let row=`<tr><td>${u.phone}</td><td>${u.balance}</td></tr>`;
        table.innerHTML+=row;
    });
}
</script>

</body>
</html>
