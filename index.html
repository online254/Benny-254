<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONLINE SPHERE COMMERCE COMPANY</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #2563eb; --dark: #1e293b; --light: #f8fafc; }
        body { font-family: sans-serif; background: var(--light); margin: 0; padding: 0; }
        
        /* Overlay UI */
        .overlay { 
            position: fixed; inset: 0; background: white; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 1000; padding: 20px;
        }
        
        .card { 
            background: white; padding: 30px; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; 
        }

        input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;
        }

        button { 
            width: 100%; padding: 12px; background: var(--primary); 
            color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
        }

        #dashboard { display: none; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .legal-links { margin-top: 20px; font-size: 12px; color: #64748b; text-align: center; }
    </style>
</head>
<body>

    <div id="authOverlay" class="overlay">
        <div class="card">
            <h2 style="text-align:center; color:var(--primary)">SPHERE COMMERCE</h2>
            <p style="text-align:center; font-size: 14px;">Enter your details to continue</p>
            
            <input type="number" id="phone" placeholder="Phone Number (10 digits)">
            <input type="password" id="pass" placeholder="Password">
            
            <button onclick="handleAuth('login')" style="margin-bottom:10px;">Login</button>
            <button onclick="handleAuth('signup')" style="background: #10b981;">Create New Account</button>

            <div class="legal-links">
                By continuing, you agree to our <br>
                <a href="#">Terms of Service</a> | <a href="#">Privacy Policy</a>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <header style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Welcome, <span id="userDisp">User</span></h3>
            <button onclick="logout()" style="width:auto; padding: 5px 15px; background:#ef4444;">Logout</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <small>Total Balance</small>
                <h2 id="balanceDisp">Ksh 0.00</h2>
            </div>
            <div class="stat-card">
                <small>Tasks Completed</small>
                <h2 id="tasksDisp">0</h2>
            </div>
        </div>

        <div class="stat-card" style="margin-bottom: 20px;">
            <h4>Available Task</h4>
            <p>Click the button below to earn Ksh 50</p>
            <button onclick="completeTask()" id="taskBtn">Complete Task</button>
        </div>
    </div>

    <script>
        // --- STEP 1: FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- STEP 2: AUTHENTICATION LOGIC ---
        async function handleAuth(type) {
            const phone = document.getElementById('phone').value;
            const pass = document.getElementById('pass').value;

            if (phone.length !== 10) {
                alert("Please enter a valid 10-digit phone number.");
                return;
            }
            if (pass.length < 6) {
                alert("Password must be at least 6 characters.");
                return;
            }

            const email = `${phone}@sphere.com`;

            try {
                if (type === 'signup') {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    // Create initial database record for new user
                    await db.collection("users").doc(res.user.uid).set({
                        phone: phone,
                        balance: 0,
                        tasksDone: 0
                    });
                    alert("Account created!");
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
            } catch (err) {
                alert(err.message);
            }
        }

        // --- STEP 3: REAL-TIME DATA SYNC ---
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                
                // Listen for balance changes in real-time
                db.collection("users").doc(user.uid).onSnapshot(doc => {
                    const data = doc.data();
                    document.getElementById('userDisp').innerText = data.phone;
                    document.getElementById('balanceDisp').innerText = "Ksh " + data.balance.toFixed(2);
                    document.getElementById('tasksDisp').innerText = data.tasksDone;
                });
            } else {
                document.getElementById('authOverlay').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
            }
        });

        // --- STEP 4: BUSINESS LOGIC (TASKS) ---
        async function completeTask() {
            const user = auth.currentUser;
            const taskBtn = document.getElementById('taskBtn');
            
            taskBtn.disabled = true;
            taskBtn.innerText = "Processing...";

            const userRef = db.collection("users").doc(user.uid);
            
            try {
                // Securely increment balance in database
                await userRef.update({
                    balance: firebase.firestore.FieldValue.increment(50),
                    tasksDone: firebase.firestore.FieldValue.increment(1)
                });
                alert("Task Complete! You earned Ksh 50.");
            } catch (err) {
                alert("Error updating balance.");
            } finally {
                taskBtn.disabled = false;
                taskBtn.innerText = "Complete Task";
            }
        }

        function logout() {
            auth.signOut();
        }
    </script>
</body>
</html>
