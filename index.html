<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary-blue: #002b5c;
            --success-green: #2ecc71;
            --text-gray: #7f8c8d;
            --bg-light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .payout-container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Header Styling */
        .table-header {
            background-color: var(--primary-blue);
            color: white;
            padding: 20px 15px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-item { flex: 1; text-align: center; }
        .header-item:first-child { text-align: left; flex: 1.2; }
        .header-item:last-child { text-align: right; }

        /* Row Styling */
        .payout-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 15px;
            border-bottom: 1px solid #eee;
            transition: background 0.3s;
        }

        .payout-row:hover { background-color: #fafafa; }

        .recipient {
            font-weight: bold;
            color: #333;
            flex: 1.2;
        }

        .amount {
            color: var(--success-green);
            font-weight: 800;
            flex: 1;
            text-align: center;
        }

        .details {
            text-align: right;
            flex: 1;
        }

        .trans-id {
            display: block;
            font-size: 10px;
            color: #bdc3c7;
            text-transform: uppercase;
        }

        .time {
            display: block;
            font-size: 10px;
            color: var(--text-gray);
            margin-top: 2px;
        }
    </style>
</head>
<body>

<div class="payout-container">
    <div class="table-header">
        <div class="header-item">Recipient</div>
        <div class="header-item">Amount</div>
        <div class="header-item">Transaction Info</div>
    </div>

    <div class="payout-row">
        <div class="recipient">074xxx8772</div>
        <div class="amount">KES 8,000</div>
        <div class="details">
            <span class="trans-id">OSX495395Q</span>
            <span class="time">09:04 AM</span>
        </div>
    </div>

    <div class="payout-row">
        <div class="recipient">011xxx3381</div>
        <div class="amount">KES 3,400</div>
        <div class="details">
            <span class="trans-id">OSX436683Q</span>
            <span class="time">09:04 AM</span>
        </div>
    </div>

    <div class="payout-row">
        <div class="recipient">079xxx1239</div>
        <div class="amount">KES 7,400</div>
        <div class="details">
            <span class="trans-id">OSX341963Q</span>
            <span class="time">09:04 AM</span>
        </div>
    </div>
</div>

</body>
</html>
